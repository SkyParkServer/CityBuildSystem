name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3

      - name: Build with Gradle
        run: ./gradlew --no-daemon clean build

      - name: Generate changelog from commits
        shell: bash
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)"

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            RANGE="${PREVIOUS_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi

          {
            echo "## Changelog"
            echo
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "Changes since ${PREVIOUS_TAG}:"
            else
              echo "Initial release changes:"
            fi
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${RANGE}"
            echo
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/libs/*.jar \
            --title "${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md
